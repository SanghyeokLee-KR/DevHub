<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#475569"/>
    </marker>
    <marker id="ahd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="450" fill="#ffffff"/>

  <!-- Client -->
  <rect x="120" y="20" width="320" height="54" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="280" y="44" text-anchor="middle" font-size="15" font-weight="600" fill="#334155">Browser</text>
  <text x="280" y="63" text-anchor="middle" font-size="11" fill="#64748b">Thymeleaf · jQuery · SockJS / STOMP</text>

  <line x1="280" y1="74" x2="280" y2="101" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="289" y="92" font-size="10.5" fill="#64748b">HTTP · Ajax · WebSocket</text>

  <!-- Spring Boot container -->
  <rect x="80" y="104" width="400" height="300" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="100" y="128" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.3">Spring Boot Application</text>

  <!-- Security -->
  <rect x="104" y="140" width="352" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="280" y="164" text-anchor="middle" font-size="11.5" font-weight="600" fill="#5b21b6">Spring Security &#160;·&#160; Session → SecurityContext</text>
  <line x1="280" y1="180" x2="280" y2="193" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Controller -->
  <rect x="104" y="194" width="352" height="54" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="280" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Controller</text>
  <text x="280" y="235" text-anchor="middle" font-size="10.5" fill="#1d4ed8">Member · Board · Order · Event · Chat · Team</text>
  <line x1="280" y1="248" x2="280" y2="261" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Service -->
  <rect x="104" y="262" width="352" height="54" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="280" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Service &#160;·&#160; @Transactional</text>
  <text x="280" y="303" text-anchor="middle" font-size="10.5" fill="#15803d">Business Logic</text>
  <line x1="280" y1="316" x2="280" y2="329" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Repository -->
  <rect x="104" y="330" width="352" height="52" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="280" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Repository</text>
  <text x="280" y="370" text-anchor="middle" font-size="10.5" fill="#b45309">Spring Data JPA</text>

  <!-- External APIs -->
  <rect x="560" y="254" width="280" height="54" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="700" y="276" text-anchor="middle" font-size="12.5" font-weight="600" fill="#475569">External APIs</text>
  <text x="700" y="295" text-anchor="middle" font-size="10.5" fill="#64748b">Dialogflow · iamport(KakaoPay) · ipinfo</text>
  <line x1="456" y1="286" x2="558" y2="282" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ahd)"/>
  <text x="470" y="277" font-size="10" fill="#94a3b8">REST</text>

  <!-- Database -->
  <line x1="456" y1="356" x2="616" y2="372" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="472" y="350" font-size="10" fill="#64748b">JPA / JDBC</text>
  <path d="M623,362 V404 a72,12 0 0 0 144,0 V362" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
  <ellipse cx="695" cy="362" rx="72" ry="12" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="695" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Oracle / H2</text>
</svg>
