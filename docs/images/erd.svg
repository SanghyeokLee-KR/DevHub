  <text x="415" y="301" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">LOGIN</text>
  <text x="352" y="324" font-size="10.5" fill="#475569">LId &#128273; · IP/위치</text>

  <!-- TEAM -->
  <rect x="340" y="375" width="150" height="46" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="340" y="375" width="150" height="22" rx="5" fill="#8b5cf6"/><rect x="340" y="388" width="150" height="9" fill="#8b5cf6"/>
  <text x="415" y="391" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">TEAM</text>
  <text x="352" y="414" font-size="10.5" fill="#475569">TId &#128273;</text>

  <!-- PROJECT -->
  <rect x="660" y="375" width="150" height="46" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="660" y="375" width="150" height="22" rx="5" fill="#8b5cf6"/><rect x="660" y="388" width="150" height="9" fill="#8b5cf6"/>
  <text x="735" y="391" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">PROJECT</text>
  <text x="672" y="414" font-size="10.5" fill="#475569">PId &#128273;</text>

  <!-- RESUME -->
  <rect x="660" y="443" width="150" height="46" rx="5" fill="#fff" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="660" y="443" width="150" height="22" rx="5" fill="#8b5cf6"/><rect x="660" y="456" width="150" height="9" fill="#8b5cf6"/>
  <text x="735" y="459" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">RESUME</text>
  <text x="672" y="482" font-size="10.5" fill="#475569">RId &#128273;</text>
