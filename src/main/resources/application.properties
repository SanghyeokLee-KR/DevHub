spring.application.name=Devhub

# tomcat sever
server.port=9091

# Oracle Database
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/xe
# DB 계정/비밀번호는 application-secret.properties 에서 주입됩니다 (저장소에 커밋하지 않음)

# Thymeleaf cache
spring.thymeleaf.cache=false

# JPA
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Column _ underbar process
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Security — securityConfig 의 SecurityFilterChain 으로 활성화 (기존 비활성 exclude 제거)

# Java Mail SENDER
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Gmail 계정/앱비밀번호는 application-secret.properties 에서 주입됩니다 (저장소에 커밋하지 않음)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.smtp.ssl.trust=smtp.gmail.com

dialogflow.project-id=devhub-fjly
dialogflow.credentials.path=classpath:secret/devhub-fjly-217883c354c9.json

# 민감 정보(DB/메일 비밀번호 등) 분리 로드.
# 아래 파일은 .gitignore 처리되어 GitHub에 올라가지 않습니다. 없어도 부팅되도록 optional 처리.
spring.config.import=optional:classpath:application-secret.properties




