# ============================================================
#  로컬 실행용 H2 인메모리 DB 프로파일 (Oracle 미설치 환경에서 바로 실행)
#  실행: gradlew bootRun --args='--spring.profiles.active=h2'
#  원본/운영 DB는 Oracle(application.properties)이며, 이 프로파일은 개발·데모 편의용입니다.
# ============================================================

# H2 인메모리 (Oracle 호환 모드) — username/password는 secret 파일 값 그대로 사용해도 자동 생성됨
spring.datasource.url=jdbc:h2:mem:devhub;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create

# H2 웹 콘솔: http://localhost:9091/h2-console (JDBC URL을 위와 동일하게 입력)
spring.h2.console.enabled=true
